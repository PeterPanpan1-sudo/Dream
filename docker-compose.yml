services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daydream-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    networks:
      - daydream-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daydream-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - daydream-network

networks:
  daydream-network:
    driver: bridge

volumes:
  data:
